version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eloc2
      POSTGRES_USER: eloc2
      POSTGRES_PASSWORD: eloc2dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  eloc2:
    build: .
    ports:
      - "3001:3001"   # API + WebSocket + UI (single port)
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://eloc2:eloc2dev@postgres:5432/eloc2
      - AUTH_ENABLED=true
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
