  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '3001'
      - '--allow-unauthenticated'
      - '--memory'
      - '1024Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--cpu-boost'
      - '--set-env-vars'
      - 'NODE_ENV=production,AUTH_ENABLED=false'

  # Post-deploy: Quick health check
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe ${_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        echo "Running health check against $$SERVICE_URL"

        # Quick health + cold-start check
        START=$$(date +%s%N)
        HTTP_CODE=$$(curl -sf -o /dev/null -w "%{http_code}" "$$SERVICE_URL/api/health")
        END=$$(date +%s%N)
        ELAPSED=$$(( (END - START) / 1000000 ))

        echo "Health check: HTTP $$HTTP_CODE in $${ELAPSED}ms"

        if [ "$$HTTP_CODE" != "200" ]; then
          echo "FAIL: Health check returned $$HTTP_CODE"
          exit 1
        fi

        if [ $$ELAPSED -gt 10000 ]; then
          echo "WARN: Cold start > 10s ($${ELAPSED}ms)"
        fi

        echo "Deploy + health check passed"

substitutions:
  _REGION: me-west1
  _REPO: eloc2
  _SERVICE: eloc2
  _DB_INSTANCE: eloc2-db
  _DB_PASSWORD: ''  # Set via: --substitutions=_DB_PASSWORD=yourpassword

options:
  logging: CLOUD_LOGGING_ONLY
