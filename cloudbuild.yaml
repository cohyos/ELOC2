steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'BUILD_REVISION=${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}'

  # NOTE: Unit tests, integration tests, and E2E tests are disabled during
  # this deployment phase. Re-enable when CI stabilization is complete.
  # See tests/integration/ and tests/e2e/ for available test suites.

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '3001'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--set-env-vars'
      - 'NODE_ENV=production'

  # Post-deploy: Quick health check
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe ${_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        echo "Running health check against $$SERVICE_URL"

        # Quick health + cold-start check
        START=$$(date +%s%N)
        HTTP_CODE=$$(curl -sf -o /dev/null -w "%{http_code}" "$$SERVICE_URL/api/health")
        END=$$(date +%s%N)
        ELAPSED=$$(( (END - START) / 1000000 ))

        echo "Health check: HTTP $$HTTP_CODE in $${ELAPSED}ms"

        if [ "$$HTTP_CODE" != "200" ]; then
          echo "FAIL: Health check returned $$HTTP_CODE"
          exit 1
        fi

        if [ $$ELAPSED -gt 10000 ]; then
          echo "WARN: Cold start > 10s ($${ELAPSED}ms)"
        fi

        echo "Deploy + health check passed"

substitutions:
  _REGION: me-west1
  _REPO: eloc2
  _SERVICE: eloc2

options:
  logging: CLOUD_LOGGING_ONLY
